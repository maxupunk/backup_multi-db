# =============================================================================
# DOCKER COMPOSE - DESENVOLVIMENTO
# DB Backup Manager
# =============================================================================
#
# Estratégia de volumes:
#   .:/app                              — bind mount do código para hot-reload
#   backend_node_modules:/app/node_modules — named volume inicializado a partir
#     da imagem Docker (binários Linux, compilados no stage "dependencies").
#     Completamente isolado do host — nunca usa node_modules do Windows/Mac.
#
# Para forçar rebuild dos node_modules (ex: após instalar novo pacote):
#   docker compose -f docker-compose.dev.yml down -v
#   docker compose -f docker-compose.dev.yml up --build
# =============================================================================

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: development
    container_name: backup-manager-backend-dev
    restart: unless-stopped
    ports:
      - '${PORT:-3333}:3333'
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3333
      - TZ=${TZ:-America/Sao_Paulo}
      - APP_KEY=${APP_KEY}
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY}
      - BACKUP_STORAGE_PATH=/app/storage/backups
      - LOG_LEVEL=debug
      - RETENTION_DAILY=${RETENTION_DAILY:-7}
      - RETENTION_WEEKLY=${RETENTION_WEEKLY:-4}
      - RETENTION_MONTHLY=${RETENTION_MONTHLY:-12}
      - RETENTION_YEARLY=${RETENTION_YEARLY:-5}
    volumes:
      # Código fonte do host → hot-reload
      - .:/app
      # node_modules isolado: binários Linux inicializados a partir da imagem.
      # Nunca compartilhado com o host.
      - backend_node_modules:/app/node_modules
      # Persistência dos backups
      - ./storage/backups:/app/storage/backups
      # Persistência do banco SQLite
      - ./storage/database:/app/storage/database
    networks:
      - backup-network-dev

networks:
  backup-network-dev:
    driver: bridge

volumes:
  # Volume nomeado para node_modules — gerenciado exclusivamente pelo Docker.
  # Popolado na primeira inicialização com os node_modules da imagem (Linux).
  backend_node_modules:
