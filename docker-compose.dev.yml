# =============================================================================
# DOCKER COMPOSE - DESENVOLVIMENTO
# DB Backup Manager
# =============================================================================
#
# Estratégia de volumes:
#   ./backend:/app                         — bind mount do código para hot-reload
#   backend_node_modules:/app/node_modules — named volume inicializado a partir
#     da imagem Docker (binários Linux, compilados no stage "dependencies").
#     Completamente isolado do host — nunca usa node_modules do Windows/Mac.
#   frontend_dist:/app/public:ro           — build do frontend injetado no backend.
#     O serviço frontend-builder compila o Vue/Vite antes do backend subir e
#     grava o resultado neste volume, que sobrepõe ./backend/public do bind mount.
#
# Para forçar rebuild dos node_modules (ex: após instalar novo pacote):
#   docker compose -f docker-compose.dev.yml down -v
#   docker compose -f docker-compose.dev.yml up --build
#
# Para usar a porta externa definida em .env:
#   docker compose -f docker-compose.dev.yml up
# =============================================================================

services:
  frontend-builder:
    image: node:25.8.1-trixie
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_dist:/dist
    command: sh -c "npm ci && npm run build-only -- --outDir /dist"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
    env_file:
      - path: ./.env
        required: false
    ports:
      - '${DOCKER_EXTERNAL_PORT:-3344}:3333'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: debug
      TZ: ${TZ:-America/Sao_Paulo}
      BACKUP_STORAGE_PATH: /storage/backups
      SQLITE_DATABASE_PATH: /storage/database/app.sqlite3
      RETENTION_DAILY: ${RETENTION_DAILY:-7}
      RETENTION_WEEKLY: ${RETENTION_WEEKLY:-4}
      RETENTION_MONTHLY: ${RETENTION_MONTHLY:-12}
      RETENTION_YEARLY: ${RETENTION_YEARLY:-5}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - frontend_dist:/app/public:ro
      - ./backend/storage/backups:/storage/backups
      - ./backend/storage/database:/storage/database
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3333/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_dist:
