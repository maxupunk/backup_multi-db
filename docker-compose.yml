# =============================================================================
# DOCKER COMPOSE - PRODUÇÃO
# DB Backup Manager
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    expose:
      - '3333'
    networks:
      - dokploy-network
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-America/Sao_Paulo}
      BACKUP_STORAGE_PATH: /app_data/backups
      SQLITE_DATABASE_PATH: /app_data/database/app.sqlite3
      RETENTION_DAILY: ${RETENTION_DAILY:-7}
      RETENTION_WEEKLY: ${RETENTION_WEEKLY:-4}
      RETENTION_MONTHLY: ${RETENTION_MONTHLY:-12}
      RETENTION_YEARLY: ${RETENTION_YEARLY:-5}
    volumes:
      - backup-data:/app_data/backups
      - sqlite-data:/app_data/database
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3333/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  backup-data:
    name: backup-multi-db-data
  sqlite-data:
    name: backup-multi-db-sqlite

networks:
  dokploy-network:
    external: true
